<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      33%       { transform: translateY(-20px) rotate(5deg); }
      66%       { transform: translateY(10px) rotate(-3deg); }
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea, #764ba2, #f093fb, #4facfe, #667eea);
      background-size: 300% 300%;
      animation: gradientShift 10s ease infinite;
      overflow: hidden;
      position: relative;
      padding: 2rem 1rem;
    }

    .shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.15;
      animation: float 8s ease-in-out infinite;
    }

    .shape1 { width: 300px; height: 300px; background: #fff;     top: -80px;  left: -80px; animation-delay: 0s; }
    .shape2 { width: 200px; height: 200px; background: #ffd6ff;  bottom: -50px; right: -50px; animation-delay: 2s; }
    .shape3 { width: 150px; height: 150px; background: #a0c4ff;  top: 60%;    left: 10%;   animation-delay: 4s; }
    .shape4 { width: 100px; height: 100px; background: #caffbf;  top: 20%;    right: 15%;  animation-delay: 1s; }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      padding: 3rem 3.5rem;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      max-width: 520px;
      width: 100%;
    }

    .badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.25);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      margin-bottom: 1.25rem;
      animation: fadeInUp 0.8s 0.1s ease both;
    }

    .title {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 1rem;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
      animation: fadeInUp 0.8s 0.2s ease both;
    }

    .subtitle {
      font-size: 1.05rem;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 2rem;
      line-height: 1.6;
      animation: fadeInUp 0.8s 0.3s ease both;
    }

    .button-row {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeInUp 0.8s 0.4s ease both;
    }

    .btn-primary {
      padding: 0.75rem 1.75rem;
      border-radius: 12px;
      border: none;
      background: #fff;
      color: #764ba2;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 150ms ease, box-shadow 150ms ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
    }

    .btn-primary:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
    }

    .btn-primary:active { transform: translateY(0) scale(0.98); }

    .btn-outline {
      padding: 0.75rem 1.75rem;
      border-radius: 12px;
      border: 2px solid rgba(255, 255, 255, 0.7);
      background: transparent;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 150ms ease, transform 150ms ease;
    }

    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-3px);
    }

    .btn-outline:active { transform: translateY(0); }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem; }
      .button-row { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="shape shape1"></div>
    <div class="shape shape2"></div>
    <div class="shape shape3"></div>
    <div class="shape shape4"></div>

    <div class="card">
      <p class="badge">Welcome</p>
      <h1 class="title">Hello World</h1>
      <p class="subtitle">아름다운 웹의 세계에 오신 것을 환영합니다</p>
      <div class="button-row">
        <button class="btn-primary">시작하기</button>
        <button class="btn-outline">더 알아보기</button>
      </div>
    </div>
  </div>
</body>
</html>
